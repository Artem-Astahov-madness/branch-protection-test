name: Configure Branch Protection
on:
  workflow_dispatch:
    inputs:
      repositoryName:
        description: 'Repository Name'
        required: true
        default: 'branch-protection-test'
      rulesetName:
        description: 'Ruleset Name'
        required: true
        default: ruleset1

jobs:
  Configure-Branch-Protection:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout project sources
        uses: actions/checkout@v5

      - name: Apply ruleset
        uses: ./.github/actions/apply-ruleset
        with:
          rulesetName: ${{ github.event.inputs.rulesetName }}
          repositoryName: ${{ github.event.inputs.repositoryName }}
          gitPat: ${{ secrets.git_pat }}
