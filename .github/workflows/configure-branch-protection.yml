name: Configure Branch Protection Test
on:
  workflow_dispatch:
    inputs:
      organizationName:
        description: 'Organization name'
        required: true
        default: 'Artem-Astahov-madness'
      repositoryName:
        description: 'Repository Name'
        required: true
        default: 'branch-protection-test'

jobs:
  Configure-Branch-Protection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v5
      - uses: ./.github/actions/configure-branch-protection
        with:
          organizationName: ${{ github.event.inputs.organizationName }}
          repositoryName: ${{ github.event.inputs.repositoryName }}
          gitPat: ${{ secrets.git_pat }}