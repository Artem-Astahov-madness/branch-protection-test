name: 'Apply ruleset'
description: 'Applies given ruleset to the given repository'
inputs:
  organizationName:
    description: 'Organization name'
    required: true
    default: 'Artem-Astahov-madness'
  repositoryName:
    description: 'Repository name'
    required: true
  gitPat:
    description: 'Git Personal Access Token'
    required: true
  rulesetName:
    description: 'Ruleset Name'
    required: true

runs:
  using: 'composite'
  steps:

    - name: Prepare environmental variables
      shell: bash
      run: |
        set -euo pipefail
        
        ORG_NAME="${{ inputs.organizationName }}"
        REPO_NAME="${{ inputs.repositoryName }}"
        RULESET_NAME="${{ inputs.rulesetName }}"
        PAT_TOKEN="${{ inputs.gitPat }}"
        
        echo "ORG_NAME=$ORG_NAME" >> $GITHUB_ENV
        echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
        echo "RULESET_NAME=$RULESET_NAME" >> $GITHUB_ENV
        echo "PAT_TOKEN=$PAT_TOKEN" >> $GITHUB_ENV
        
        echo "GITHUB_URL=https://api.github.com/repos/$ORG_NAME/$REPO_NAME/rulesets" >> $GITHUB_ENV
        
        echo "ACCEPT_HEADER=application/vnd.github+json" >> $GITHUB_ENV
        echo "API_VERSION=2026-03-10" >> $GITHUB_ENV
        
        echo "RULESET_FILE=.github/rulesets/$RULESET_NAME.json" >> $GITHUB_ENV

    - name: Check if json exists
      shell: bash
      run: |
        if [[ ! -f $RULESET_FILE ]]; then
          echo "Ruleset file not found: .github/rulesets/$RULESET_NAME.json"
          exit 1
        fi

    - name: Check if ruleset exists
      id: ruleset-exists
      shell: bash
      run: |
        echo "Checking if ruleset with name [$RULESET_NAME] already exists"
        RESPONSE=$(curl -s "$GITHUB_URL" \
          -H "Accept: $ACCEPT_HEADER" \
          -H "X-GitHub-Api-Version: $API_VERSION" \
          -H "Authorization: Bearer $PAT_TOKEN")
        
        RULESET_ID=$(echo "$RESPONSE" | jq -r ".[] | select(.name == \"$RULESET_NAME\") | .id")
        
        if [[ -z "$RULESET_ID" || "$RULESET_ID" == "null" ]]; then
          RULESET_ID=""
          echo "Ruleset with name [$RULESET_NAME] not found"
        else
          echo "Found ruleset with name [$RULESET_NAME] and id[$RULESET_ID]"
        fi

        echo "rulesetId=$RULESET_ID" >> "$GITHUB_OUTPUT"

    - name: Create ruleset
      if: steps.ruleset-exists.outputs.rulesetId == ''
      shell: bash
      run: |
        echo "Creating ruleset with name [$RULESET_NAME]"
        curl -X POST -s $GITHUB_URL \
          -H "Accept: $ACCEPT_HEADER" \
          -H "X-GitHub-Api-Version: $API_VERSION" \
          -H "Authorization: Bearer $PAT_TOKEN" \
          -d $RULESET_FILE

    - name: Update ruleset
      if: steps.ruleset-exists.outputs.rulesetId != ''
      shell: bash
      run: |
        echo "Updating ruleset with name [$RULESET_NAME]"
        curl -X PUT -s $GITHUB_URL/${{ steps.ruleset-exists.outputs.rulesetId }} \
          -H "Accept: $ACCEPT_HEADER" \
          -H "X-GitHub-Api-Version: $API_VERSION" \
          -H "Authorization: Bearer $PAT_TOKEN" \
          -d $RULESET_FILE
