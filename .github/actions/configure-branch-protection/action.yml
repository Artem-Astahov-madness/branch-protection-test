name: 'Protect release branches'
description: 'Configure branch protection of release branches'
inputs:
  organizationName:
    description: 'Organization name'
    required: true
    default: 'Artem-Astahov-madness'
  repositoryName:
    description: 'Repository name'
    required: true
  gitPat:
    description: 'Git Personal Access Token'
    required: true

runs:
  using: 'composite'
  steps:
#    - name: Delete existing ruleset
#      shell: bash
#      run: |
#        curl -X POST https://api.github.com/repos/${{ inputs.organizationName }}/${{ inputs.repositoryName }}/rulesets \
#          -H "Accept: application/vnd.github+json" \
#          -H "X-GitHub-Api-Version: 2026-03-10" \
#          -H "Authorization: Bearer ${{ inputs.gitPat }}"

    - name: Update branch protection
      shell: bash
      run: |
        curl -X PUT https://api.github.com/repos/${{ inputs.organizationName }}/${{ inputs.repositoryName }}/rulesets \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          -H "Authorization: Bearer ${{ inputs.gitPat }}" \
          -d '{
          "name": "Release branches protection",
          "target": "branch",
          "enforcement": "active",
          "conditions": {
            "ref_name": {
              "include": ["refs/heads/release/*"],
              "exclude": []
            }
          },
          "rules": [
            {
              "type": "pull_request",
              "parameters": {
                "dismiss_stale_reviews_on_push": false,
                "require_code_owner_review": false,
                "require_last_push_approval": false,
                "required_approving_review_count": 3,
                "required_review_thread_resolution": false
              }
            },
            {
              "type": "required_status_checks",
              "parameters": {
                "required_status_checks": [
                  { "context": "Java CI" },
                  { "context": "Build and Publish" },
                  { "context": "OpenAPI Specs Validation" }
                ],
                "strict_required_status_checks_policy": true
              }
            }
          ]
        }'
